<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracer</title>
    <!-- font awosome cdn  ------------------------------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy Ui------------------------------------  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font --------------------------------- -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    </style>
</head>

<body>
    <!-- ----------- signup section ---------------  -->
    <section class="px-4">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box 
                      w-full sm:w-8/12 md:w-4/12 border p-6 mx-auto mt-16">


            <div class="mx-auto text-center space-y-2">
                <img class="mx-auto w-16 h-16" src="assets/github-logo.png" alt="github-logo">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-gray-600">Sign in to manage your issues</p>
            </div>


            <label class="label font-semibold text-black mt-4">Username</label>
            <input id="user-id" type="text" class="input w-full" placeholder="Enter Username" value="admin" />
            <p class="text-[#4A00FF] text-sm">default: admin</p>


            <label class="label font-semibold text-black mt-4">Password</label>
            <input id="pass-id" type="password" class="input w-full" placeholder="Enter Password" value="admin123" />
            <p class="text-[#4A00FF] text-sm">default: admin123</p>


            <button id="signup-btn" class="btn items-center btn-primary rounded-lg mt-4 w-full">Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i></button>


            <div class="flex items-center gap-2 mt-4">
                <hr class="flex-1 border-gray-300">
                <span class="text-gray-500">OR</span>
                <hr class="flex-1 border-gray-300">
            </div>


            <p class="text-center mt-2 text-gray-700">Demo Credentials:</p>
            <div class="demo text-center bg-slate-100 p-4 mt-2 rounded">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </fieldset>
    </section>





    <!-- js file  -->
    <script src="js/signin.js"></script>
</body>

</html>
